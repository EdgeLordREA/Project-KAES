{% extends 'template.html' %}
{% block body %}
    <h1>Welkom bij KAES</h1>
    <form method="POST" action="{{ url_for('log_in') }}">
    {{ form.hidden_tag() }}

    <div>
        {{ form.username.label }}
        {{ form.username }}
    </div>
    <div>
        {{ form.password.label }}
        {{ form.password }}
    </div>
    {{ form.submit }}
    </form>
{% endblock body %}
